name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  android-jvm:
    name: Android JVM unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run unit tests
        run: ./gradlew :gplayer:testDebugUnitTest --no-daemon --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-jvm-test-results
          path: gplayer/build/reports/tests/testDebugUnitTest/
          retention-days: 14

  ios-simulator:
    name: iOS simulator tests
    # Only macOS runners ship the iOS simulator runtime + full Xcode.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Boot iOS simulator
        # Pre-boot the simulator so the test task doesn't pay the
        # ~30s warm-up cost during the test run itself.
        run: |
          xcrun simctl list devices available
          xcrun simctl boot "iPhone 15" || true

      - name: Run iOS simulator tests
        run: ./gradlew :gplayer:iosSimulatorArm64Test --no-daemon --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: gplayer/build/reports/tests/iosSimulatorArm64Test/
          retention-days: 14

  build-aar:
    name: Build Android AAR
    runs-on: ubuntu-latest
    needs: android-jvm
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Assemble release AAR
        run: ./gradlew :gplayer:assembleRelease --no-daemon

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: gplayer-release-aar
          path: gplayer/build/outputs/aar/*.aar
          retention-days: 14
